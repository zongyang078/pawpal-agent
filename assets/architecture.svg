<svg width="800" height="620" viewBox="0 0 800 620" xmlns="http://www.w3.org/2000/svg" style="font-family: 'Segoe UI', Arial, sans-serif; background: white;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="600" fill="#1a1a1a">PawPal+ Agent — System Architecture</text>

  <!-- User Input -->
  <rect x="310" y="50" width="180" height="40" rx="20" fill="#f1efe8" stroke="#888780" stroke-width="1"/>
  <text x="400" y="75" text-anchor="middle" font-size="13" fill="#444441">User (natural language)</text>

  <line x1="400" y1="90" x2="400" y2="125" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Streamlit Chat UI -->
  <rect x="280" y="125" width="240" height="44" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="1"/>
  <text x="400" y="152" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Streamlit chat interface</text>

  <line x1="400" y1="169" x2="400" y2="210" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Agent Core -->
  <rect x="200" y="210" width="400" height="70" rx="12" fill="#eeedfe" stroke="#534ab7" stroke-width="1"/>
  <text x="400" y="238" text-anchor="middle" font-size="15" font-weight="600" fill="#3c3489">AI Agent (ReAct loop)</text>
  <text x="400" y="260" text-anchor="middle" font-size="12" fill="#534ab7">Intent detect → Plan → Execute tools → Self-check</text>

  <!-- Self-check loop -->
  <path d="M600 245 L650 245 L650 210 L620 210" fill="none" stroke="#7f77dd" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="670" y="230" font-size="11" fill="#534ab7">Self-check</text>

  <!-- Arrows to tools -->
  <line x1="280" y1="280" x2="145" y2="330" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="280" x2="400" y2="330" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="520" y1="280" x2="655" y2="330" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Tool 1: Task Manager -->
  <rect x="50" y="330" width="190" height="56" rx="8" fill="#faece7" stroke="#993c1d" stroke-width="1"/>
  <text x="145" y="353" text-anchor="middle" font-size="14" font-weight="500" fill="#712b13">Task manager</text>
  <text x="145" y="372" text-anchor="middle" font-size="11" fill="#993c1d">CRUD + scheduling</text>

  <!-- Tool 2: Scheduler -->
  <rect x="305" y="330" width="190" height="56" rx="8" fill="#faece7" stroke="#993c1d" stroke-width="1"/>
  <text x="400" y="353" text-anchor="middle" font-size="14" font-weight="500" fill="#712b13">Scheduler</text>
  <text x="400" y="372" text-anchor="middle" font-size="11" fill="#993c1d">Sort, filter, conflicts</text>

  <!-- Tool 3: Knowledge Base -->
  <rect x="560" y="330" width="190" height="56" rx="8" fill="#faece7" stroke="#993c1d" stroke-width="1"/>
  <text x="655" y="353" text-anchor="middle" font-size="14" font-weight="500" fill="#712b13">Knowledge base (RAG)</text>
  <text x="655" y="372" text-anchor="middle" font-size="11" fill="#993c1d">TF-IDF retrieval</text>

  <!-- Arrows to data -->
  <line x1="145" y1="386" x2="145" y2="435" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="400" y1="386" x2="400" y2="435" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="655" y1="386" x2="655" y2="435" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Data layer -->
  <rect x="50" y="435" width="190" height="40" rx="8" fill="#f1efe8" stroke="#888780" stroke-width="1"/>
  <text x="145" y="460" text-anchor="middle" font-size="13" fill="#444441">JSON persistence</text>

  <rect x="305" y="435" width="190" height="40" rx="8" fill="#f1efe8" stroke="#888780" stroke-width="1"/>
  <text x="400" y="460" text-anchor="middle" font-size="13" fill="#444441">Owner / Pet / Task</text>

  <rect x="560" y="435" width="190" height="40" rx="8" fill="#f1efe8" stroke="#888780" stroke-width="1"/>
  <text x="655" y="460" text-anchor="middle" font-size="13" fill="#444441">Pet care docs (13)</text>

  <!-- Guardrails -->
  <rect x="50" y="520" width="340" height="44" rx="8" fill="#faeeda" stroke="#854f0b" stroke-width="1"/>
  <text x="220" y="540" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">Guardrails</text>
  <text x="220" y="556" text-anchor="middle" font-size="11" fill="#854f0b">Toxic food · Emergency · Vet referral · Confidence</text>

  <line x1="220" y1="475" x2="220" y2="520" stroke="#854f0b" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- Logging -->
  <rect x="460" y="520" width="290" height="44" rx="8" fill="#e6f1fb" stroke="#185fa5" stroke-width="1"/>
  <text x="605" y="540" text-anchor="middle" font-size="14" font-weight="500" fill="#0c447c">Logger</text>
  <text x="605" y="556" text-anchor="middle" font-size="11" fill="#185fa5">Intent · Tool calls · Guardrails · Response</text>

  <line x1="605" y1="475" x2="605" y2="520" stroke="#185fa5" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <text x="50" y="600" font-size="11" fill="#888780">Purple = Agent core · Coral = Tools · Yellow = Safety · Blue = Logging · Gray = Data</text>
</svg>
